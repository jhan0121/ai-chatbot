    secret: ${JWT_SECRET:jre3btmaes2gfdvozipsck1jklnjgfjgfn3kjgfbovcv2vbnkjflgf4kjb7j2khiljyhgfd4dfwaesdsg3tyrtdsf2vbhtrs}
    expiration-ms: 86400000
  admin:
    email: ${ADMIN_EMAIL:admin@example.com}
